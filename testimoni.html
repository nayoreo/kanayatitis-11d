<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Usaha Buku</title>
    <link href="https://fonts.googleapis.com/css2?family=Fontdiner+Swanky&family=Jolly+Lodger&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header> <img src="images/header1.jpg" width="100%"></header>
    <nav> 
        <a href="index.html">Beranda</a>
        <a href="produk.html">Produk</a>
        <a href="bedah-buku.html">Bedah Buku</a>
        <a href="testimoni.html">Testimoni</a>
        <a href="tampil-testimoni.html">Testimoni Pembeli</a>
         <a href="kontak.html">Kontak</a>
         <a href="event.html">Event</a>
    </nav>

    <h1>NayaTales</h1>

    <main class="formulir"> 
        <h2>Drop Your Experience Here</h2>

        <form id="formTestimoni">

            <label for="nama">Name:</label>
            <input type="text" id="nama" required placeholder="Name">

            <label for="affiliation">Affiliation:</label>
            <input type="text" id="affiliation" required placeholder="Affiliation">

            <label for="email">Email:</label>
            <input type="email" id="email" required placeholder="email@example.com">

            <label for="bookPurchased">Book Purchased:</label>
            <input type="text" id="bookPurchased" required placeholder="Book Purchased">

            <label for="bookRating">Book Rating (1-5):</label>
            <input type="number" id="bookRating" min="1" max="5" required>

            <label for="pesan">Your Experience:</label>
            <textarea id="pesan" required placeholder="Drop Your Experience here..." rows="5"></textarea>

            <button type="submit">Send Your Experience</button>

        </form>
    </main>

    <footer>
        <p>&copy; 2026 NayaTales</p>
    </footer>

    <script>
        document.getElementById('formTestimoni').addEventListener('submit', function(e) {
            e.preventDefault();

            const nama = document.getElementById('nama').value;
            const affiliation = document.getElementById('affiliation').value;
            const email = document.getElementById('email').value;
            const bookPurchased = document.getElementById('bookPurchased').value;
            const bookRating = document.getElementById('bookRating').value;
            const pesan = document.getElementById('pesan').value;

            const dataBaru = { 
                nama, 
                affiliation, 
                email, 
                bookPurchased, 
                bookRating, 
                pesan 
            };

            const testimoniList = JSON.parse(localStorage.getItem('testimoniList')) || [];

            testimoniList.push(dataBaru);

            localStorage.setItem('testimoniList', JSON.stringify(testimoniList));

            window.location.href = 'proses-testimoni.html';
        });
    </script>

</body>
</html>
